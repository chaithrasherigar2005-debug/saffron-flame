<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saffron Flame | Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),
    url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4");

    background-size:cover;
    background-position:center;
}

.container{

    width:100%;
    max-width:430px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(14px);

    border-radius:28px;

    padding:45px 35px;

    color:white;

    box-shadow:0 0 35px rgba(255,0,0,0.25);

    border:1px solid rgba(255,255,255,0.08);
}

.logo{

    text-align:center;

    font-size:55px;

    margin-bottom:10px;
}

h1{

    text-align:center;

    color:#ff4d4d;

    margin-bottom:10px;

    font-size:34px;
}

.subtitle{

    text-align:center;

    color:#ddd;

    margin-bottom:35px;

    line-height:1.6;
}

.input-box{

    margin-bottom:22px;
}

.input-box label{

    display:block;

    margin-bottom:8px;

    font-weight:600;
}

.input-box input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:14px;

    outline:none;

    background:rgba(255,255,255,0.12);

    color:white;

    font-size:15px;
}

.input-box input::placeholder{

    color:#ddd;
}

.reset-btn{

    width:100%;

    padding:16px;

    border:none;

    border-radius:14px;

    background:linear-gradient(
        to right,
        #ff2e2e,
        #b30000
    );

    color:white;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.reset-btn:hover{

    transform:translateY(-3px);
}

.error{

    background:rgba(255,0,0,0.15);

    border:1px solid rgba(255,0,0,0.4);

    padding:12px;

    border-radius:12px;

    margin-bottom:22px;

    text-align:center;

    color:#ffb3b3;
}

.back-link{

    margin-top:22px;

    text-align:center;
}

.back-link a{

    color:#ff9999;

    text-decoration:none;
}

.back-link a:hover{

    color:white;
}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        🔐
    </div>

    <h1>Forgot Password</h1>

    <p class="subtitle">
        Enter your email address and we'll send an OTP for verification.
    </p>

    {% if error %}

    <div class="error">

        {{ error }}

    </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="input-box">

            <label>Email Address</label>

            <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
            >

        </div>

        <button
            type="submit"
            class="reset-btn"
            id="otp-btn"
        >
            Send OTP
        </button>

        <script>
            document.querySelector("form").addEventListener("submit", function() {
                document.getElementById("otp-btn").disabled = true;
                document.getElementById("otp-btn").innerText = "Sending...";
            });
        </script>
        

    </form>

    <div class="back-link">

        <a href="/login/">

            ← Back to Login

        </a>

    </div>

</div>

</body>
</html>
