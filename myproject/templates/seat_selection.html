<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saffron Flame Seat Selection</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:
      linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.85)),
      url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4");
      background-size:cover;
      background-position:center;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:850px;
      background:rgba(28,28,28,0.9);
      backdrop-filter:blur(12px);
      padding:35px;
      border-radius:25px;
      box-shadow:0 0 30px rgba(255,0,0,0.25);
      animation:fadeIn 1s ease;
    }

    h1{
      text-align:center;
      color:#ff4d4d;
      margin-bottom:10px;
      font-size:42px;
      text-shadow:0 0 15px rgba(255,0,0,0.4);
    }

    .subtitle{
      text-align:center;
      color:#ddd;
      margin-bottom:30px;
      font-size:17px;
    }

    .screen{
      background:linear-gradient(to right,#ff2e2e,#b30000);
      color:white;
      text-align:center;
      padding:14px;
      border-radius:12px;
      margin-bottom:35px;
      font-weight:bold;
      letter-spacing:3px;
      box-shadow:0 0 20px rgba(255,77,77,0.5);
    }

    .seat-container{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:18px;
      margin-bottom:35px;
    }

    .seat{
      width:100%;
      height:60px;
      border:none;
      border-radius:14px;
      background:#2f2f2f;
      color:white;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      font-size:16px;
    }

    .seat:hover{
      transform:translateY(-4px) scale(1.05);
      background:#ff6666;
    }

    .seat.selected{
      background:#ff0000;
      box-shadow:0 0 15px red;
    }

    .seat.booked{
      background:gray;
      cursor:not-allowed;
      opacity:0.5;
    }

    .legend{
      display:flex;
      justify-content:center;
      gap:25px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    .legend div{
      display:flex;
      align-items:center;
      gap:10px;
      color:#ddd;
      font-size:15px;
    }

    .box{
      width:22px;
      height:22px;
      border-radius:6px;
    }

    .available{
      background:#2f2f2f;
    }

    .selected-box{
      background:red;
    }

    .booked-box{
      background:gray;
    }

    .summary{
      text-align:center;
      margin-bottom:25px;
      font-size:20px;
      font-weight:500;
      color:#fff;
    }

    .summary span{
      color:#ff4d4d;
      font-weight:bold;
    }

    .book-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:linear-gradient(to right,#ff2e2e,#b30000);
      color:white;
      font-size:19px;
      cursor:pointer;
      transition:0.3s;
      font-weight:600;
      box-shadow:0 0 20px rgba(255,0,0,0.3);
    }

    .book-btn:hover{
      transform:translateY(-3px);
      box-shadow:0 0 25px rgba(255,0,0,0.5);
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    @media(max-width:700px){

      .seat-container{
        grid-template-columns:repeat(4,1fr);
      }

      h1{
        font-size:32px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>🍽️ Saffron Flame</h1>

    <p class="subtitle">
      Select your premium dining seats
    </p>

    <div class="screen">
      LIVE DINING ZONE
    </div>

    <!-- SEATS -->

    <div class="seat-container">

      <button class="seat">A1</button>
      <button class="seat">A2</button>
      <button class="seat booked">A3</button>
      <button class="seat">A4</button>
      <button class="seat">A5</button>
      <button class="seat booked">A6</button>

      <button class="seat">B1</button>
      <button class="seat">B2</button>
      <button class="seat">B3</button>
      <button class="seat booked">B4</button>
      <button class="seat">B5</button>
      <button class="seat">B6</button>

      <button class="seat">C1</button>
      <button class="seat booked">C2</button>
      <button class="seat">C3</button>
      <button class="seat">C4</button>
      <button class="seat">C5</button>
      <button class="seat">C6</button>

    </div>

    <!-- LEGEND -->

    <div class="legend">

      <div>
        <div class="box available"></div>
        Available
      </div>

      <div>
        <div class="box selected-box"></div>
        Selected
      </div>

      <div>
        <div class="box booked-box"></div>
        Booked
      </div>

    </div>

    <!-- SUMMARY -->

    <div class="summary">

      Selected Seat:
      <span id="selectedSeats">None</span>

    </div>

    <!-- BUTTON -->

    <button class="book-btn" id="confirmSeat">
      Confirm Seat
    </button>

  </div>
  <script>
    const occupiedSeats = {{ occupied_seats|safe }};

document.querySelectorAll(".seat").forEach(seat => {

    if (
        occupiedSeats.includes(
            seat.innerText.trim()
        )
    ) {

        seat.classList.add("booked");

    }

});

const selectedSeatsText =
document.getElementById("selectedSeats");

const confirmBtn =
document.getElementById("confirmSeat");

let selectedSeats = [];

document.querySelectorAll(".seat").forEach(seat => {

    seat.addEventListener("click", () => {

        if (
            seat.classList.contains("booked")
        ) {
            return;
        }

        document
        .querySelectorAll(".seat")
        .forEach(s =>
            s.classList.remove("selected")
        );

        seat.classList.add("selected");

        selectedSeats = [
            seat.innerText
        ];

        selectedSeatsText.innerText =
        selectedSeats.join(", ");

    });

});

confirmBtn.addEventListener("click", () => {

    if (
        selectedSeats.length === 0
    ) {

        alert(
            "Please select a seat first!"
        );

        return;

    }

    sessionStorage.setItem(
        "selectedSeat",
        selectedSeats[0]
    );

    window.location.href =
    "/reservation/";

});



  </script>

  
  

</body>
</html>
