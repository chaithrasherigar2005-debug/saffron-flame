<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saffron Flame | Create Account</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
            url('https://images.unsplash.com/photo-1528605248644-14dd04022da1?q=80&w=1600&auto=format&fit=crop');
            background-size:cover;
            background-position:center;
            padding:30px;
        }

        .register-container{
            width:100%;
            max-width:460px;
            background:rgba(20,20,20,0.75);
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:24px;
            padding:45px;
            box-shadow:0 0 35px rgba(255, 87, 34, 0.35);
            color:white;
        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo h1{
            color:#ff5c33;
            font-size:38px;
            margin-bottom:8px;
            letter-spacing:1px;
        }

        .logo p{
            color:#ddd;
            font-size:15px;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            color:#f5f5f5;
            font-weight:bold;
            font-size:14px;
        }

        .form-group input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            outline:none;
            background:rgba(255,255,255,0.10);
            color:white;
            font-size:15px;
            transition:0.3s;
        }

        .form-group input:focus{
            border:1px solid #ff5c33;
            box-shadow:0 0 10px rgba(255,92,51,0.4);
        }

        .form-group input::placeholder{
            color:#cccccc;
        }

        .otp-box{
            display:flex;
            gap:10px;
        }

        .otp-box input{
            flex:1;
        }

        .otp-btn{
            padding:15px;
            border:none;
            border-radius:12px;
            background:#ff5c33;
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .otp-btn:hover{
            background:#ff2e00;
        }

        .register-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(to right,#ff512f,#dd2476);
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .register-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(255,82,82,0.4);
        }

        .bottom-text{
            text-align:center;
            margin-top:25px;
            color:#ddd;
            font-size:14px;
        }

        .bottom-text a{
            color:#ff7b54;
            text-decoration:none;
            font-weight:bold;
        }

        .bottom-text a:hover{
            color:white;
        }

        .offer-box{
            margin-top:25px;
            padding:15px;
            border-radius:14px;
            background:rgba(255,255,255,0.08);
            border-left:4px solid #ff5c33;
            color:#eee;
            font-size:14px;
            line-height:1.5;
        }

        @media(max-width:500px){

            .register-container{
                padding:30px 25px;
            }

            .logo h1{
                font-size:30px;
            }

            .otp-box{
                flex-direction:column;
            }

        }

    </style>
</head>

<body>

    <div class="register-container">

        <div class="logo">

            <h1>🍽️ Saffron Flame</h1>

            <p>Create your account and reserve your dining experience</p>

        </div>

        <form method="POST" autocomplete="off">
            {% if error %}
    <p style="
        color:red;
        text-align:center;
        margin-bottom:15px;
        font-weight:bold;
    ">
        {{ error }}
    </p>
{% endif %}

            {% csrf_token %}

            <div class="form-group">

                <label>Full Name</label>

                <input 
                    type="text"
                    name="full_name"
                    placeholder="Enter your full name"
                    autocomplete="off"
                    required
                >

            </div>

            <div class="form-group">

    <label>Mobile Number</label>

        <input 
            type="tel"
            name="mobile"
            placeholder="Enter 10-digit mobile number"
            maxlength="10"
            pattern="[0-9]{10}"
            required
        >

</div>

            <div class="form-group">

                <label>Email Address</label>

                <input 
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    autocomplete="off"
                    required
                >

            </div>

<div class="form-group">

    <label>Password</label>

    <input 
        type="password"
        name="password"
        placeholder="Create password"
        autocomplete="new-password"
        required
    >

</div>


            <button type="submit" class="register-btn">

                Create Account

            </button>

        </form>

        <div class="offer-box">

            🔥 Get exclusive dining offers, priority seat booking and festive saffron flame deals after registration.

        </div>

        <div class="bottom-text">

            Already have an account?

            <a href="/login/">Login</a>

        </div>

    </div>

    <script>

sessionStorage.removeItem("name");
sessionStorage.removeItem("phone");
sessionStorage.removeItem("email");
sessionStorage.removeItem("password");
const mobileInput =
document.querySelector(
    'input[name="mobile"]'
);

mobileInput.addEventListener(
    'input',
    function(){

        this.value =
        this.value.replace(
            /[^0-9]/g,
            ''
        );

        if(this.value.length > 10){

            this.value =
            this.value.slice(0,10);

        }

    }
);

</script>

</body>
</html>
