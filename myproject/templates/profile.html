<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Saffron Flame | Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;

            background:
            linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),
            url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4');

            background-size:cover;
            background-position:center;
        }

        .profile-card{

            width:100%;
            max-width:500px;

            background:rgba(20,20,20,0.78);

            backdrop-filter:blur(14px);

            border-radius:28px;

            padding:40px;

            color:white;

            box-shadow:0 0 35px rgba(255,70,70,0.25);

            border:1px solid rgba(255,255,255,0.08);

            animation:fadeIn 0.8s ease;
        }

        .profile-top{

            text-align:center;

            margin-bottom:35px;
        }

        .profile-image{

            width:110px;
            height:110px;

            border-radius:50%;

            background:linear-gradient(to right,#ff512f,#dd2476);

            display:flex;
            justify-content:center;
            align-items:center;

            margin:auto;

            font-size:42px;

            margin-bottom:18px;

            box-shadow:0 0 25px rgba(255,82,82,0.5);
        }

        .profile-top h1{

            font-size:32px;

            margin-bottom:8px;
        }

        .profile-top p{

            color:#bbb;
        }

        .info-box{

            background:rgba(255,255,255,0.05);

            padding:18px;

            border-radius:16px;

            margin-bottom:18px;

            border:1px solid rgba(255,255,255,0.06);
        }

        .info-box label{

            display:block;

            color:#ff7b54;

            font-size:14px;

            margin-bottom:6px;
        }

        .info-box h3{

            font-size:18px;

            font-weight:500;
        }

        .button-group{

            display:flex;

            gap:15px;

            margin-top:30px;
        }

        .btn{

            flex:1;

            padding:15px;

            border:none;

            border-radius:14px;

            cursor:pointer;

            text-decoration:none;

            text-align:center;

            font-weight:600;

            transition:0.3s;
        }

        .home-btn{

            background:linear-gradient(to right,#ff512f,#dd2476);

            color:white;
        }

        .logout-btn{

            background:#2e2e2e;

            color:white;
        }

        .btn:hover{

            transform:translateY(-2px);
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(25px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:600px){

            .profile-card{
                padding:28px 22px;
            }

            .button-group{
                flex-direction:column;
            }
        }

        .edit-btn{

    display:inline-block;

    padding:10px 18px;

    border-radius:10px;

    background:linear-gradient(to right,#ff512f,#dd2476);

    color:white;

    text-decoration:none;

    font-size:14px;

    font-weight:600;

    transition:0.3s;
}

.edit-btn:hover{

    transform:translateY(-2px);

    box-shadow:0 0 15px rgba(255,82,82,0.4);
}

    </style>

</head>

<body>

    <div class="profile-card">

        <div class="profile-top">

            <div class="profile-image">
                👤
            </div>

            <h1>{{ request.user.first_name }}</h1>

            <p>Saffron Flame Premium Member</p>

        </div>

        <div class="info-box">

            <label>Full Name</label>

            <h3>{{ request.user.first_name }}</h3>

        </div>

        <div class="info-box">

            <label>Email Address</label>

            <h3>{{ request.user.email }}</h3>

        </div>
        <div class="info-box">

            <label>Phone Number</label>

            <h3>{{ request.user.userprofile.phone }}</h3>

        </div>
        <div class="info-box">

    <label>Delivery Address</label>

    <h3 style="margin-bottom:15px;">
        {{ request.user.userprofile.address }}
    </h3>

    <a href="/delivery/?next=profile" class="edit-btn">
        Edit Address
    </a>

</div>
          


        <div class="info-box">

            <label>Member Since</label>

            <h3>{{ request.user.date_joined }}</h3>

        </div>

        <div class="button-group">

            <a href="/" class="btn home-btn">
                Back Home
            </a>

            <a href="/logout/" class="btn logout-btn">
                Logout
            </a>

        </div>

    </div>

</body>
</html>
